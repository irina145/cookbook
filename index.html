                isFavorite = favorites.includes(recipe.id);
            }
            
            const isAuthor = currentUser && currentUser.id === recipe.author_id;
            
            return `
                <div class="recipe-card" onclick="showRecipeDetail(${recipe.id})">
                    <img src="${recipe.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800'}" alt="${recipe.title}" class="recipe-image" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800'">
                    <div class="recipe-content">
                        <div class="recipe-title">
                            <span>${recipe.title}</span>
                            <div style="display: flex; gap: 5px;">
                                ${isAuthor ? `
                                    <button class="delete-btn" onclick="showDeleteConfirm(${recipe.id}, event)" title="Удалить рецепт">
                                        🗑️
                                    </button>
                                ` : ''}
                                <button class="favorite-btn" onclick="toggleFavoriteRecipe(${recipe.id}, event)" title="${isFavorite ? 'Удалить из избранного' : 'Добавить в избранное'}">
                                    ${isFavorite ? '★' : '☆'}
                                </button>
                            </div>
                        </div>
                        
                        <div class="rating">
                            <div class="stars">
                                ${[1,2,3,4,5].map(star => `
                                    <span class="star ${star <= Math.round(recipe.rating || 5) ? 'filled' : ''}" 
                                          onclick="rateRecipe(${recipe.id}, ${star}, event)">
                                        ★
                                    </span>
                                `).join('')}
                            </div>
                            <span class="rating-value">${(recipe.rating || 5).toFixed(1)} (${recipe.ratings_count || 0})</span>
                        </div>
                        
                        <div class="recipe-author">
                            <div class="author-mini">${(recipe.author_name || 'Аноним').charAt(0)}</div>
                            <span>${recipe.author_name || 'Аноним'}</span>
                        </div>
                        
                        <div class="recipe-meta">
                            <span class="recipe-meta-item">⏱ ${recipe.total_time || 0} мин</span>
                            <span class="recipe-meta-item">👥 ${recipe.servings || 1} порц.</span>
                            <span class="recipe-meta-item">${recipe.difficulty || 'Средняя'}</span>
                            ${recipe.calorie_count ? `
                                <span class="recipe-meta-item">🔥 ${recipe.calorie_count} ккал</span>
                            ` : ''}
                        </div>
                        
                        <div style="font-size: 12px; color: var(--gray); margin-bottom: 10px;">
                            <strong>Основные ингредиенты:</strong> ${getMainIngredients(recipe).join(', ')}
                        </div>
                        
                        <div class="recipe-tags">
                            ${(recipe.tags || []).slice(0, 2).map(tag => `
                                <span class="recipe-tag">${tag}</span>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }
        
        function getMainIngredients(recipe) {
            return (recipe.ingredients || []).slice(0, 3).map(ing => {
                return ing.replace(/\d+\s*(г|кг|мл|л|шт|ч\.л|ст\.л|\.|,)/g, '').trim().split(' ')[0];
            });
        }
        
        // ========== УДАЛЕНИЕ РЕЦЕПТА ==========
        function showDeleteConfirm(recipeId, event) {
            if (event) {
                event.stopPropagation();
            }
            
            recipeToDelete = recipeId;
            document.getElementById('confirm-delete-modal').classList.add('active');
        }
        
        function closeConfirmDeleteModal() {
            document.getElementById('confirm-delete-modal').classList.remove('active');
            recipeToDelete = null;
        }
        
        async function confirmDeleteRecipe() {
            if (!recipeToDelete) return;
            
            try {
                const result = await DB.deleteRecipe(recipeToDelete);
                
                if (result.success) {
                    showNotification('Рецепт успешно удален');
                    closeConfirmDeleteModal();
                    
                    // Обновляем текущую страницу
                    await navigateTo(currentPage);
                } else {
                    showNotification('Ошибка при удалении рецепта', 'error');
                }
            } catch (error) {
                console.error('Ошибка удаления:', error);
                showNotification('Ошибка при удалении рецепта', 'error');
            }
        }
        
        // ========== ОЦЕНКА РЕЦЕПТА ==========
        async function rateRecipe(recipeId, rating, event) {
            if (event) event.stopPropagation();
            
            if (!currentUser) {
                showAuthModal('login');
                return;
            }
            
            try {
                await DB.rateRecipe(recipeId, currentUser.id, rating);
                showNotification(`Вы оценили рецепт на ${rating} звезд!`);
                
                // Обновляем отображение
                if (currentPage === 'home') {
                    await showHomePage();
                } else if (currentPage === 'categories') {
                    await showCategoriesPage();
                } else if (currentPage === 'my-recipes') {
                    await showMyRecipesPage();
                } else if (currentPage === 'favorites') {
                    await showFavoritesPage();
                }
            } catch (error) {
                showNotification('Ошибка оценки рецепта', 'error');
            }
        }
        
        // ========== ПОКАЗ РЕЦЕПТА ==========
        async function showRecipeDetail(recipeId) {
            const recipe = await DB.getRecipe(recipeId);
            if (!recipe) {
                showNotification('Рецепт не найден', 'error');
                return;
            }
            
            let isFavorite = false;
            
            if (currentUser) {
                const favorites = await DB.getFavorites(currentUser.id);
                isFavorite = favorites.includes(recipe.id);
            }
            
            const isAuthor = currentUser && currentUser.id === recipe.author_id;
            
            document.getElementById('modal-recipe-title').textContent = recipe.title;
            
            document.getElementById('recipe-modal-content').innerHTML = `
                <div style="display: flex; gap: 30px; margin-bottom: 30px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 300px;">
                        <img src="${recipe.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800'}" alt="${recipe.title}" style="width: 100%; border-radius: 12px; height: 300px; object-fit: cover;" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800'">
                    </div>
                    <div style="flex: 1; min-width: 300px;">
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px;">
                            <div style="padding: 10px; background: var(--light-green); border-radius: 8px;">
                                <div style="font-weight: bold; color: var(--secondary-green);">${recipe.total_time || 0} мин</div>
                                <div style="font-size: 12px; color: var(--gray);">Время готовки</div>
                            </div>
                            <div style="padding: 10px; background: var(--light-green); border-radius: 8px;">
                                <div style="font-weight: bold; color: var(--secondary-green);">${recipe.servings || 1} порции</div>
                                <div style="font-size: 12px; color: var(--gray);">Количество</div>
                            </div>
                            <div style="padding: 10px; background: var(--light-green); border-radius: 8px;">
                                <div style="font-weight: bold; color: var(--secondary-green);">${recipe.difficulty || 'Средняя'}</div>
                                <div style="font-size: 12px; color: var(--gray);">Сложность</div>
                            </div>
                            ${recipe.calorie_count ? `
                                <div style="padding: 10px; background: var(--light-green); border-radius: 8px;">
                                    <div style="font-weight: bold; color: var(--secondary-green);">${recipe.calorie_count} ккал</div>
                                    <div style="font-size: 12px; color: var(--gray);">Калорийность</div>
                                </div>
                            ` : ''}
                            <div style="padding: 10px; background: var(--light-green); border-radius: 8px; ${!recipe.calorie_count ? 'grid-column: span 2;' : ''}">
                                <div style="font-weight: bold; color: var(--secondary-green);">
                                    <div class="rating">
                                        <div class="stars">
                                            ${[1,2,3,4,5].map(star => `
                                                <span class="star ${star <= Math.round(recipe.rating || 5) ? 'filled' : ''}" 
                                                      onclick="rateRecipe(${recipe.id}, ${star}, event)">
                                                    ★
                                                </span>
                                            `).join('')}
                                        </div>
                                        <span class="rating-value">${(recipe.rating || 5).toFixed(1)}</span>
                                    </div>
                                </div>
                                <div style="font-size: 12px; color: var(--gray);">Рейтинг (${recipe.ratings_count || 0} оценок)</div>
                            </div>
                        </div>
                        
                        <div style="margin-bottom: 20px;">
                            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                                <div class="author-mini">${(recipe.author_name || 'Аноним').charAt(0)}</div>
                                <div>
                                    <div style="font-weight: 500;">${recipe.author_name || 'Аноним'}</div>
                                    <div style="font-size: 12px; color: var(--gray);">Автор рецепта</div>
                                </div>
                            </div>
                            <div style="color: var(--gray);">${recipe.description || 'Вкусный домашний рецепт'}</div>
                        </div>
                        
                        <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;">
                            ${(recipe.tags || []).map(tag => `
                                <span style="background: var(--light-green); color: var(--secondary-green); padding: 4px 10px; border-radius: 12px; font-size: 12px;">
                                    ${tag}
                                </span>
                            `).join('')}
                        </div>
                        
                        ${currentUser ? `
                            <div style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;">
                                <button onclick="toggleFavoriteRecipe(${recipe.id})" style="padding: 10px 20px; background: ${isFavorite ? 'var(--light-green)' : 'linear-gradient(135deg, var(--accent-green), var(--secondary-green))'}; color: ${isFavorite ? 'var(--secondary-green)' : 'white'}; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                                    ${isFavorite ? '★' : '☆'} ${isFavorite ? 'В избранном' : 'Добавить в избранное'}
                                </button>
                                
                                ${isAuthor ? `
                                    <button onclick="showDeleteConfirm(${recipe.id})" style="padding: 10px 20px; background: var(--danger); color: white; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                                        🗑️ Удалить рецепт
                                    </button>
                                ` : ''}
                            </div>
                        ` : ''}
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px;">
                    <div>
                        <h3 style="font-family: 'Playfair Display', serif; color: var(--primary-green); margin-bottom: 15px; font-size: 20px;">
                            🧺 Ингредиенты
                        </h3>
                        <ul style="list-style: none; padding-left: 0;">
                            ${(recipe.ingredients || []).map(ing => `
                                <li style="padding: 8px 0; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px;">
                                    <span>🌿</span> <span>${ing}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                    
                    <div>
                        <h3 style="font-family: 'Playfair Display', serif; color: var(--primary-green); margin-bottom: 15px; font-size: 20px;">
                            👩‍🍳 Приготовление
                        </h3>
                        <ol style="padding-left: 20px;">
                            ${(recipe.steps || []).map((step, index) => `
                                <li style="padding: 10px 0; margin-bottom: 10px; border-bottom: 1px solid #f0f0f0;">
                                    <strong>Шаг ${index + 1}:</strong> ${step}
                                </li>
                            `).join('')}
                        </ol>
                    </div>
                </div>
            `;
            
            document.getElementById('recipe-modal').classList.add('active');
        }
        
        // ========== ИЗБРАННОЕ ==========
        async function toggleFavoriteRecipe(recipeId, event) {
            if (event) {
                event.stopPropagation();
            }
            
            if (!currentUser) {
                showAuthModal('login');
                return;
            }
            
            try {
                const result = await DB.toggleFavorite(currentUser.id, recipeId);
                const added = result.added;
                
                showNotification(added ? 'Добавлено в избранное' : 'Удалено из избранного');
                
                if (currentPage === 'favorites') {
                    await showFavoritesPage();
                } else {
                    await navigateTo(currentPage);
                }
                
                await updateUserInterface();
            } catch (error) {
                showNotification('Ошибка добавления в избранное', 'error');
            }
        }
        
        // ========== АВТОРИЗАЦИЯ ==========
        function showAuthModal(type) {
            const modal = document.getElementById('auth-modal');
            const title = document.getElementById('auth-modal-title');
            const formContainer = document.getElementById('auth-form-container');
            
            title.textContent = type === 'login' ? 'Вход' : 'Регистрация';
            
            formContainer.innerHTML = `
                <form id="${type}-form" class="auth-form">
                    ${type === 'register' ? `
                        <div class="form-group">
                            <label class="form-label">Имя</label>
                            <input type="text" class="form-input" id="register-name" required>
                        </div>
                    ` : ''}
                    
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="${type}-email" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Пароль</label>
                        <input type="password" class="form-input" id="${type}-password" required minlength="6">
                    </div>
                    
                    <button type="submit" class="auth-btn">
                        ${type === 'login' ? 'Войти' : 'Зарегистрироваться'}
                    </button>
                </form>
                
                <div class="auth-switch">
                    ${type === 'login' 
                        ? 'Нет аккаунта? <a class="auth-link" onclick="showAuthModal(\'register\')">Зарегистрироваться</a>'
                        : 'Уже есть аккаунт? <a class="auth-link" onclick="showAuthModal(\'login\')">Войти</a>'
                    }
                </div>
            `;
            
            document.getElementById(`${type}-form`).addEventListener('submit', async function(e) {
                e.preventDefault();
                if (type === 'login') {
                    await login();
                } else {
                    await register();
                }
            });
            
            modal.classList.add('active');
        }
        
        function closeAuthModal() {
            document.getElementById('auth-modal').classList.remove('active');
        }
        
        async function register() {
            const name = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            
            try {
                const result = await DB.register({
                    email: email,
                    name: name,
                    password: password,
                    avatar: name.charAt(0).toUpperCase()
                });
                
                if (result.success) {
                    currentUser = result.user;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    // Отправляем приветственное письмо
                    await sendRegistrationEmail(currentUser);
                    
                    closeAuthModal();
                    await updateUserInterface();
                    await navigateTo('home');
                    showNotification(`Добро пожаловать, ${name}! Письмо отправлено на вашу почту.`);
                } else {
                    showNotification(result.message || 'Ошибка регистрации', 'error');
                }
            } catch (error) {
                showNotification('Ошибка регистрации', 'error');
            }
        }
        
        async function login() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            
            try {
                const result = await DB.login(email, password);
                
                if (result.success) {
                    currentUser = result.user;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    closeAuthModal();
                    await updateUserInterface();
                    await navigateTo('home');
                    showNotification(`С возвращением, ${currentUser.name}!`);
                } else {
                    showNotification(result.message || 'Неверный email или пароль', 'error');
                }
            } catch (error) {
                showNotification('Ошибка входа', 'error');
            }
        }
        
        async function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            await updateUserInterface();
            await navigateTo('home');
            showNotification('Вы вышли из системы');
        }
        
        // ========== ДОБАВЛЕНИЕ РЕЦЕПТА ==========
        function showAddRecipeModal() {
            if (!currentUser) {
                showAuthModal('login');
                return;
            }
            
            document.getElementById('add-recipe-modal').classList.add('active');
        }
        
        function closeAddRecipeModal() {
            document.getElementById('add-recipe-modal').classList.remove('active');
            document.getElementById('recipe-form').reset();
        }
        
        async function addRecipe() {
            if (!currentUser) {
                showAuthModal('login');
                return;
            }
            
            const title = document.getElementById('recipe-title').value.trim();
            const category = document.getElementById('recipe-category').value;
            const time = parseInt(document.getElementById('recipe-time').value);
            const servings = parseInt(document.getElementById('recipe-servings').value);
            const difficulty = document.getElementById('recipe-difficulty').value;
            const calorie_count = parseInt(document.getElementById('recipe-calorie_count').value);
            const ingredients = document.getElementById('recipe-ingredients').value.split('\n').filter(i => i.trim());
            const steps = document.getElementById('recipe-steps').value.split('\n').filter(s => s.trim());
            const tags = document.getElementById('recipe-tags').value.split(',').map(t => t.trim()).filter(t => t);
            const image = document.getElementById('recipe-image').value.trim() || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800';
            
            const recipe = {
                title: title,
                description: `Вкусный рецепт "${title}"`,
                category: category,
                prep_time: Math.floor(time * 0.4),
                cook_time: Math.floor(time * 0.6),
                total_time: time,
                difficulty: difficulty,
                servings: servings,
                calorie_count: calorie_count,
                rating: 5.0,
                ratings_count: 1,
                views: 0,
                author_id: currentUser.id,
                author_name: currentUser.name,
                image_url: image,
                ingredients: ingredients,
                steps: steps,
                tags: tags.length > 0 ? tags : [category, difficulty]
            };
            
            try {
                const result = await DB.addRecipe(recipe);
                if (result.success) {
                    // Автоматически ставим оценку 5 звезд от автора
                    await DB.rateRecipe(result.id || recipe.id, currentUser.id, 5);
                    
                    closeAddRecipeModal();
                    await showRecipeDetail(result.id || recipe.id);
                    showNotification('Рецепт успешно добавлен!');
                    
                    if (currentPage === 'my-recipes') {
                        await showMyRecipesPage();
                    } else {
                        await navigateTo(currentPage);
                    }
                }
            } catch (error) {
                console.error('Ошибка добавления рецепта:', error);
                showNotification('Ошибка добавления рецепта', 'error');
            }
        }
        
        // ========== УТИЛИТЫ ==========
        function closeRecipeModal() {
            document.getElementById('recipe-modal').classList.remove('active');
        }
        
        function getCategoryIcon(categoryName) {
            const icons = {
                'Супы': '🥣',
                'Основные блюда': '🍛',
                'Салаты': '🥗',
                'Десерты': '🍰',
                'Выпечка': '🥐',
                'Закуски': '🍤',
                'Напитки': '🥤',
                'Завтраки': '🍳'
            };
            return icons[categoryName] || '✨';
        }
        
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${type === 'error' ? '#ff6b6b' : 'var(--accent-green)'};
                color: white;
                padding: 15px 25px;
                border-radius: 8px;
                box-shadow: var(--shadow-hover);
                z-index: 10000;
                font-family: 'Raleway', sans-serif;
                animation: slideIn 0.3s ease;
            `;
            
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }
        
        // ========== ЗАГРУЗКА ==========
        document.addEventListener('DOMContentLoaded', () => {
            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideIn {
                    from { transform: translateY(100%); opacity: 0; }
                    to { transform: translateY(0); opacity: 1; }
                }
                @keyframes slideOut {
                    from { transform: translateY(0); opacity: 1; }
                    to { transform: translateY(100%); opacity: 0; }
                }
            `;
            document.head.appendChild(style);
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    document.querySelectorAll('.modal-overlay.active').forEach(modal => {
                        modal.classList.remove('active');
                    });
                }
            });
            
            init();
        });
    </script>
</body>
</html>
