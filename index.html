<!DOCTYPE html>
<html lang="ru">
<head>
    <title>🍳 Кулинарная книга</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Playfair+Display:wght@400;500;600&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- EmailJS библиотека для отправки писем -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        /* ВАШ ИСХОДНЫЙ CSS СТИЛЬ - ОСТАВЛЯЕМ БЕЗ ИЗМЕНЕНИЙ */
        :root {
            --primary-green: #1a3c27;
            --secondary-green: #2d5a3b;
            --accent-green: #7cb342;
            --light-green: #e8f5e9;
            --lighter-green: #f5fff0;
            --white: #ffffff;
            --gray-light: #f5f5f5;
            --gray: #666666;
            --gray-dark: #333333;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.15);
            --danger: #ff6b6b;
            --danger-dark: #ff5252;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: var(--white);
            font-family: 'Raleway', sans-serif;
            color: var(--gray-dark);
            line-height: 1.6;
        }
        
        /* HEADER */
        .site-header {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--secondary-green) 100%);
            padding: 15px 0;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        
        .logo h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 36px;
            color: var(--white);
            font-weight: 700;
        }
        
        .logo-icon {
            font-size: 32px;
            color: var(--accent-green);
        }
        
        /* MAIN NAVIGATION */
        .main-nav {
            display: flex;
            gap: 30px;
        }
        
        .nav-item {
            position: relative;
            color: var(--light-green);
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            padding: 10px 0;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
        }
        
        .nav-item:hover {
            color: var(--accent-green);
        }
        
        .nav-item.active {
            color: var(--accent-green);
        }
        
        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--accent-green);
        }
        
        /* USER ACTIONS */
        .user-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--white);
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent-green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--white);
        }
        
        .action-btn {
            background: none;
            border: none;
            color: var(--white);
            cursor: pointer;
            font-size: 18px;
            padding: 8px;
            border-radius: 50%;
            transition: background-color 0.3s;
            position: relative;
        }
        
        .action-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .favorites-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: var(--accent-green);
            color: var(--white);
            font-size: 12px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* MAIN CONTENT */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            min-height: calc(100vh - 150px);
        }
        
        /* AUTH FORMS */
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 40px;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow-hover);
        }
        
        .auth-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--primary-green);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-label {
            color: var(--secondary-green);
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-input {
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Raleway', sans-serif;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 2px rgba(124, 179, 66, 0.1);
        }
        
        .auth-btn {
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-green), var(--secondary-green));
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-family: 'Raleway', sans-serif;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }
        
        .auth-btn-danger {
            background: linear-gradient(135deg, var(--danger), var(--danger-dark));
        }
        
        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: var(--gray);
            font-size: 14px;
        }
        
        .auth-link {
            color: var(--accent-green);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        
        .auth-link:hover {
            text-decoration: underline;
        }
        
        /* PAGE HEADER */
        .page-header {
            margin-bottom: 30px;
        }
        
        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--primary-green);
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .page-description {
            color: var(--gray);
            font-size: 16px;
        }
        
        /* CATEGORIES GRID */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .category-card {
            background-color: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        
        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }
        
        .category-icon {
            height: 120px;
            background: linear-gradient(135deg, var(--light-green), var(--lighter-green));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--secondary-green);
        }
        
        .category-content {
            padding: 20px;
        }
        
        .category-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--primary-green);
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .category-count {
            color: var(--gray);
            font-size: 14px;
        }
        
        /* AUTHORS GRID */
        .authors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .author-card {
            background-color: var(--white);
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .author-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }
        
        .author-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-green), var(--secondary-green));
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--white);
            font-weight: bold;
        }
        
        .author-name {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: var(--primary-green);
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .author-role {
            color: var(--gray);
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .author-stats {
            display: flex;
            justify-content: space-around;
            font-size: 12px;
            color: var(--gray);
        }
        
        /* RECIPES GRID */
        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .recipe-card {
            background-color: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        
        .recipe-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }
        
        .recipe-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        
        .recipe-content {
            padding: 20px;
        }
        
        .recipe-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: var(--primary-green);
            margin-bottom: 10px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .favorite-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #FFD700;
            cursor: pointer;
            padding: 5px;
            transition: transform 0.3s;
        }
        
        .favorite-btn:hover {
            transform: scale(1.2);
        }
        
        .delete-btn {
            background: none;
            border: none;
            font-size: 18px;
            color: var(--danger);
            cursor: pointer;
            padding: 5px;
            transition: transform 0.3s;
            opacity: 0.7;
        }
        
        .delete-btn:hover {
            transform: scale(1.2);
            opacity: 1;
        }
        
        /* РЕЙТИНГ - ВАША ОРИГИНАЛЬНАЯ ВЕРСИЯ */
        .rating {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 10px;
        }
        
        .stars {
            display: flex;
            gap: 2px;
        }
        
        .star {
            font-size: 18px;
            color: #ddd;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .star:hover {
            color: #FFD700;
        }
        
        .star.filled {
            color: #FFD700;
        }
        
        .rating-value {
            font-size: 14px;
            color: var(--gray);
            margin-left: 5px;
        }
        
        .recipe-meta {
            display: flex;
            justify-content: space-between;
            color: var(--gray);
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .recipe-meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .recipe-author {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--gray);
        }
        
        .author-mini {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent-green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--white);
            font-weight: bold;
        }
        
        .recipe-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .recipe-tag {
            background-color: var(--light-green);
            color: var(--secondary-green);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        /* ADD RECIPE BUTTON */
        .add-recipe-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-green), var(--secondary-green));
            color: var(--white);
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: var(--shadow-hover);
            transition: all 0.3s;
            z-index: 100;
        }
        
        .add-recipe-btn:hover {
            transform: scale(1.1);
        }
        
        /* MODALS */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: var(--white);
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-large {
            max-width: 900px;
        }
        
        .modal-header {
            padding: 25px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--primary-green);
            font-weight: 600;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 30px;
            color: var(--gray);
            cursor: pointer;
            padding: 5px;
        }
        
        .modal-content {
            padding: 25px;
        }
        
        /* PROFILE PAGE */
        .profile-header {
            background: linear-gradient(135deg, var(--light-green), var(--lighter-green));
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .profile-avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-green), var(--secondary-green));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--white);
            font-weight: bold;
        }
        
        .profile-info {
            flex: 1;
        }
        
        .profile-name {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--primary-green);
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .profile-email {
            color: var(--gray);
            margin-bottom: 15px;
        }
        
        .profile-stats {
            display: flex;
            gap: 30px;
        }
        
        .profile-stat {
            text-align: center;
        }
        
        .stat-number {
            font-family: 'Dancing Script', cursive;
            font-size: 36px;
            color: var(--secondary-green);
            font-weight: 600;
        }
        
        .stat-label {
            color: var(--gray);
            font-size: 14px;
        }
        
        /* ПОИСК ПО ИНГРЕДИЕНТАМ - ВАША ВЕРСИЯ */
        .ingredients-search-container {
            background: var(--white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }
        
        .ingredients-input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .ingredients-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Raleway', sans-serif;
            font-size: 16px;
        }
        
        .ingredients-input:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 2px rgba(124, 179, 66, 0.1);
        }
        
        .search-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, var(--accent-green), var(--secondary-green));
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .search-examples {
            color: var(--gray);
            font-size: 14px;
            margin-top: 10px;
        }
        
        .search-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        
        .search-tag {
            background: var(--light-green);
            color: var(--secondary-green);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        
        .search-tag:hover {
            background: var(--accent-green);
            color: white;
        }
        
        .ingredients-chip {
            background: var(--light-green);
            color: var(--secondary-green);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin: 2px;
        }
        
        .remove-chip {
            cursor: pointer;
            padding: 2px 5px;
            border-radius: 50%;
            background: rgba(0,0,0,0.1);
        }
        
        .remove-chip:hover {
            background: rgba(0,0,0,0.2);
        }
        
        /* CONFIRM MODAL */
        .confirm-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .confirm-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-family: 'Raleway', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .confirm-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }
        
        .confirm-btn-yes {
            background: linear-gradient(135deg, var(--danger), var(--danger-dark));
            color: white;
        }
        
        .confirm-btn-no {
            background: var(--light-green);
            color: var(--secondary-green);
        }
        
        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                gap: 15px;
            }
            
            .main-nav {
                gap: 15px;
                overflow-x: auto;
                padding-bottom: 10px;
                width: 100%;
                justify-content: center;
            }
            
            .user-actions {
                width: 100%;
                justify-content: center;
            }
            
            .categories-grid,
            .authors-grid,
            .recipes-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
            
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            
            .profile-stats {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- ВАШ ИСХОДНЫЙ HTML - БЕЗ ИЗМЕНЕНИЙ -->
    <!-- HEADER -->
    <header class="site-header">
        <div class="header-container">
            <div class="logo" onclick="navigateTo('home')">
                <span class="logo-icon">🍳</span>
                <h1>Кулинарная книга</h1>
            </div>
            
            <nav class="main-nav">
                <button class="nav-item active" onclick="navigateTo('home')">🏠 Главная</button>
                <button class="nav-item" onclick="navigateTo('categories')">📚 Категории</button>
                <button class="nav-item" onclick="navigateTo('my-recipes')">📝 Мои рецепты</button>
                <button class="nav-item" onclick="navigateTo('favorites')">⭐ Избранное</button>
                <button class="nav-item" onclick="navigateTo('profile')">👤 Профиль</button>
            </nav>
            
            <div class="user-actions" id="user-actions">
                <!-- Будет заполнено динамически -->
            </div>
        </div>
    </header>
    
    <!-- MAIN CONTENT -->
    <div class="main-container" id="main-content">
        <!-- Контент загружается динамически -->
    </div>
    
    <!-- КНОПКА ДОБАВЛЕНИЯ РЕЦЕПТА -->
    <button class="add-recipe-btn" onclick="showAddRecipeModal()" style="display: none;" id="add-recipe-btn">+</button>
    
    <!-- МОДАЛЬНОЕ ОКНО АВТОРИЗАЦИИ -->
    <div class="modal-overlay" id="auth-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="auth-modal-title">Вход</h2>
                <button class="modal-close" onclick="closeAuthModal()">×</button>
            </div>
            <div class="modal-content">
                <div id="auth-form-container">
                    <!-- Форма загружается динамически -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ РЕЦЕПТА -->
    <div class="modal-overlay" id="add-recipe-modal">
        <div class="modal modal-large">
            <div class="modal-header">
                <h2 class="modal-title">Добавить рецепт</h2>
                <button class="modal-close" onclick="closeAddRecipeModal()">×</button>
            </div>
            <div class="modal-content">
                <form id="recipe-form" class="auth-form">
                    <div class="form-group">
                        <label class="form-label">Название рецепта</label>
                        <input type="text" class="form-input" id="recipe-title" required>
                    </div>
                    
                    <div class="form-group">

        // ========== ИНИЦИАЛИЗАЦИЯ EMAILJS ==========
        // 🔧 ЗАМЕНИТЕ ЭТИ ЗНАЧЕНИЯ НА ВАШИ ДАННЫЕ ИЗ EMAILJS
        const EMAILJS_CONFIG = {

            SERVICE_ID: 'YOUR_SERVICE_ID', // Замените на ваш Service ID
            TEMPLATE_ID: 'YOUR_TEMPLATE_ID' // Замените на ваш Template ID

        // ========== ФУНКЦИЯ ОТПРАВКИ ПИСЬМА О РЕГИСТРАЦИИ ==========

                const response = await emailjs.send(
                    EMAILJS_CONFIG.SERVICE_ID,
                    EMAILJS_CONFIG.TEMPLATE_ID,
                    templateParams
                );
                
                console.log('Email отправлен успешно:', response);
                return true;

                console.error('Ошибка отправки email:', error);
                return false;

        // ========== ВАШ ИСХОДНЫЙ JS С ОБЛАЧНОЙ БАЗОЙ ==========

        const API_URL = 'https://script.google.com/macros/s/AKfycbyXKWE-zrjvFWrZiAYx8I-ZEToKWH8mx8g0T1QD8WNhpUMSOLUHb8yhycTpM-VEVQqaZA/exec';
        
        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let currentPage = 'home';
        let currentSearchIngredients = [];
        let currentSearchQuery = '';
        let recipeToDelete = null;
        
        // ========== ОБЛАЧНАЯ БАЗА ДАННЫХ ==========
        const CloudDB = {
            async testConnection() {
                try {
                    const response = await fetch(`${API_URL}?action=test`);
                    const data = await response.json();
                    console.log('API тест:', data);
                    return data.status === 'ok';

                    console.warn('Не удалось подключиться к облаку');
                    return false;

            },
            
            async register(user) {

                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },

                            action: 'register',
                            email: user.email,

                            password: user.password,
                            avatar: user.avatar
                        })
                    });
                    return await response.json();

                    return { success: false, message: 'Ошибка сети' };
                }
            },
            
            async login(email, password) {
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'login',

                            password: password
                        })

                    return await response.json();
                } catch (error) {
                    return { success: false, message: 'Ошибка сети' };
                }
            },
            
            async getRecipes() {
                try {
                    const response = await fetch(`${API_URL}?action=getRecipes`);
                    const data = await response.json();

            async addRecipe(recipe) {

                    });

            async deleteRecipe(recipeId) {
                try {

                        body: JSON.stringify({

                    return await response.json();
                } catch (error) {
                    return { success: false, message: 'Ошибка сети' };
                }
            },
            
            async getRecipe(id) {
                try {
                    const response = await fetch(`${API_URL}?action=getRecipe&id=${id}`);
                    const data = await response.json();
                    return data.recipe || null;
                } catch (error) {
                    console.error('Ошибка получения рецепта:', error);
                    return null;
                }
            },
            
            async rateRecipe(recipeId, userId, rating) {
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'rateRecipe',
                            recipeId: recipeId,
                            userId: userId,
                            rating: rating
                        })
                    });
                    return await response.json();
                } catch (error) {
                    return { success: false, message: 'Ошибка сети' };
                }
            },
            
            async toggleFavorite(userId, recipeId) {
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'toggleFavorite',
                            userId: userId,
                            recipeId: recipeId
                        })
                    });
                    return await response.json();
                } catch (error) {
                    return { success: false, message: 'Ошибка сети' };
                }
            },
            
            async getFavorites(userId) {
                try {
                    const response = await fetch(`${API_URL}?action=getFavorites&userId=${userId}`);
                    const data = await response.json();
                    return data.favorites || [];
                } catch (error) {
                    console.error('Ошибка получения избранного:', error);
                    return [];
                }
            }
        };
        
        // ========== ЛОКАЛЬНЫЙ КЭШ (для оффлайн работы) ==========
        const LocalCache = {
            getRecipes() {
                return JSON.parse(localStorage.getItem('recipes_cache') || '[]');
            },
            
            getFavorites(userId) {
                const favorites = JSON.parse(localStorage.getItem('favorites_cache') || '{}');
                return favorites[userId] || [];
            },
            
            saveRecipes(recipes) {
                localStorage.setItem('recipes_cache', JSON.stringify(recipes));
            },
            
            saveFavorites(userId, favoriteIds) {
                const favorites = JSON.parse(localStorage.getItem('favorites_cache') || '{}');
                favorites[userId] = favoriteIds;
                localStorage.setItem('favorites_cache', JSON.stringify(favorites));
            },
            
            deleteRecipe(recipeId) {
                const recipes = this.getRecipes();
                const updatedRecipes = recipes.filter(r => r.id != recipeId);
                this.saveRecipes(updatedRecipes);
                
                // Также удаляем из избранного всех пользователей
                const favorites = JSON.parse(localStorage.getItem('favorites_cache') || '{}');
                Object.keys(favorites).forEach(userId => {
                    favorites[userId] = favorites[userId].filter(id => id != recipeId);
                });
                localStorage.setItem('favorites_cache', JSON.stringify(favorites));
                
                return true;
            },
            
            searchByIngredients(ingredientsArray) {
                const recipes = this.getRecipes();
                if (ingredientsArray.length === 0) return recipes;
                
                return recipes.filter(recipe => {
                    const recipeIngredients = (recipe.ingredients || []).map(ing => ing.toLowerCase());
                    return ingredientsArray.every(searchIng => 
                        recipeIngredients.some(recipeIng => 
                            recipeIng.includes(searchIng.toLowerCase())
                        )
                    );
                });
            }
        };
        
        // ========== МЕНЕДЖЕР ДАННЫХ ==========
        const DB = {
            useCloud: false,
            
            async init() {
                this.useCloud = await CloudDB.testConnection();
                console.log('Используем облачную БД:', this.useCloud);
                
                // Загружаем данные из облака в кэш
                if (this.useCloud) {
                    try {
                        const recipes = await CloudDB.getRecipes();
                        LocalCache.saveRecipes(recipes);
                        console.log('Загружено рецептов в кэш:', recipes.length);
                    } catch (error) {
                        console.error('Ошибка загрузки рецептов:', error);
                    }
                }
                
                return this.useCloud;
            },
            
            // Пользователи
            async register(user) {
                if (this.useCloud) {
                    return await CloudDB.register(user);
                } else {
                    // Локальная регистрация
                    const users = JSON.parse(localStorage.getItem('users_cache') || '[]');
                    const existingUser = users.find(u => u.email === user.email);
                    
                    if (existingUser) {
                        return { success: false, message: 'Пользователь уже существует' };
                    }
                    
                    const newUser = {
                        ...user,
                        id: Date.now(),
                        created_at: new Date().toISOString()
                    };
                    
                    users.push(newUser);
                    localStorage.setItem('users_cache', JSON.stringify(users));
                    
                    return { success: true, user: newUser };
                }
            },
            
            async login(email, password) {
                if (this.useCloud) {
                    return await CloudDB.login(email, password);
                } else {
                    const users = JSON.parse(localStorage.getItem('users_cache') || '[]');
                    const user = users.find(u => u.email === email && u.password === password);
                    
                    if (user) {
                        return { success: true, user: user };
                    } else {
                        // Проверяем демо-пользователя
                        if (email === 'demo@example.com' && password === 'demo123') {
                            const demoUser = {
                                id: 1,
                                email: 'demo@example.com',
                                name: 'Демо Пользователь',
                                avatar: 'Д'
                            };
                            return { success: true, user: demoUser };
                        }
                        return { success: false, message: 'Неверные данные' };
                    }
                }
            },
            
            // Рецепты
            async getRecipes() {
                if (this.useCloud) {
                    const cloudRecipes = await CloudDB.getRecipes();
                    if (cloudRecipes.length > 0) {
                        LocalCache.saveRecipes(cloudRecipes);
                        return cloudRecipes;
                    }
                }
                
                const cachedRecipes = LocalCache.getRecipes();
                if (cachedRecipes.length > 0) {
                    return cachedRecipes;
                }
                
                // Если нет рецептов, добавляем демо
                const demoRecipes = [
                    {
                        id: 1,
                        title: "Борщ классический",
                        description: "Традиционный украинский борщ со свеклой и говядиной",
                        category: "Супы",
                        total_time: 120,
                        difficulty: "Средняя",
                        servings: 6,
                        calorie_count: 350,
                        rating: 4.8,
                        ratings_count: 24,
                        author_id: 1,
                        author_name: "Демо Пользователь",
                        image_url: "https://images.unsplash.com/photo-1547592180-85f173990554?w=800",
                        ingredients: ["500 г говядины", "2 шт свеклы", "3 картофелины", "1 морковь", "1 луковица", "200 г капусты"],
                        steps: ["Варить мясо 1.5 часа", "Нарезать овощи", "Добавить овощи в бульон", "Варить 30 минут", "Подавать со сметаной"],
                        tags: ["русская кухня", "мясо", "суп"]
                    },
                    {
                        id: 2,
                        title: "Омлет с овощами",
                        description: "Пышный омлет с болгарским перцем и помидорами",
                        category: "Завтраки",
                        total_time: 25,
                        difficulty: "Легкая",
                        servings: 2,
                        calorie_count: 250,
                        rating: 4.5,
                        ratings_count: 18,
                        author_id: 1,
                        author_name: "Демо Пользователь",
                        image_url: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800",
                        ingredients: ["4 яйца", "50 мл молока", "1 помидор", "1 болгарский перец", "соль", "перец", "зелень"],
                        steps: ["Взбить яйца с молоком", "Нарезать овощи", "Обжарить овощи", "Залить яйцами", "Готовить 10 минут"],
                        tags: ["завтрак", "быстро", "просто"]
                    }
                ];
                
                LocalCache.saveRecipes(demoRecipes);
                return demoRecipes;
            },
            
            async addRecipe(recipe) {
                if (this.useCloud) {
                    const result = await CloudDB.addRecipe(recipe);
                    if (result.success) {
                        // Обновляем кэш
                        const recipes = await this.getRecipes();
                        const newRecipe = {
                            ...recipe,
                            id: result.id,
                            rating: 5.0,
                            ratings_count: 1,
                            created_at: new Date().toISOString()
                        };
                        recipes.push(newRecipe);
                        LocalCache.saveRecipes(recipes);
                    }
                    return result;
                } else {
                    const recipes = LocalCache.getRecipes();
                    const newRecipe = {
                        ...recipe,
                        id: Date.now(),
                        rating: 5.0,
                        ratings_count: 1,
                        created_at: new Date().toISOString()
                    };
                    
                    recipes.push(newRecipe);
                    LocalCache.saveRecipes(recipes);
                    
                    return { success: true, id: newRecipe.id };
                }
            },
            
            async deleteRecipe(recipeId) {
                if (this.useCloud) {
                    const result = await CloudDB.deleteRecipe(recipeId);
                    if (result.success) {
                        // Обновляем кэш
                        LocalCache.deleteRecipe(recipeId);
                    }
                    return result;
                } else {
                    LocalCache.deleteRecipe(recipeId);
                    return { success: true };
                }
            },
            
            async getRecipe(id) {
                const recipes = await this.getRecipes();
                return recipes.find(r => r.id == id) || null;
            },
            
            // Рейтинги
            async rateRecipe(recipeId, userId, rating) {
                if (this.useCloud) {
                    const result = await CloudDB.rateRecipe(recipeId, userId, rating);
                    if (result.success) {
                        // Обновляем кэш
                        const recipes = await this.getRecipes();
                        const recipeIndex = recipes.findIndex(r => r.id == recipeId);
                        if (recipeIndex !== -1) {
                            const currentRating = recipes[recipeIndex].rating || 5;
                            const currentCount = recipes[recipeIndex].ratings_count || 1;
                            recipes[recipeIndex].rating = ((currentRating * currentCount) + rating) / (currentCount + 1);
                            recipes[recipeIndex].ratings_count = currentCount + 1;
                            LocalCache.saveRecipes(recipes);
                        }
                    }
                    return result;
                } else {
                    const recipes = LocalCache.getRecipes();
                    const recipeIndex = recipes.findIndex(r => r.id == recipeId);
                    
                    if (recipeIndex !== -1) {
                        const currentRating = recipes[recipeIndex].rating || 5;
                        const currentCount = recipes[recipeIndex].ratings_count || 1;
                        recipes[recipeIndex].rating = ((currentRating * currentCount) + rating) / (currentCount + 1);
                        recipes[recipeIndex].ratings_count = currentCount + 1;
                        LocalCache.saveRecipes(recipes);
                    }
                    
                    return { success: true };
                }
            },
            
            // Избранное
            async toggleFavorite(userId, recipeId) {
                if (this.useCloud) {
                    const result = await CloudDB.toggleFavorite(userId, recipeId);
                    if (result.success) {
                        this.updateLocalFavorites(userId, recipeId, result.added);
                    }
                    return result;
                } else {
                    const added = this.updateLocalFavorites(userId, recipeId);
                    return { success: true, added: added };
                }
            },
            
            updateLocalFavorites(userId, recipeId, shouldAdd = null) {
                const favorites = LocalCache.getFavorites(userId);
                const index = favorites.indexOf(recipeId);
                let added = false;
                
                if (shouldAdd !== null) {
                    added = shouldAdd;
                    if (shouldAdd && index === -1) {
                        favorites.push(recipeId);
                    } else if (!shouldAdd && index !== -1) {
                        favorites.splice(index, 1);
                    }
                } else {
                    if (index === -1) {
                        favorites.push(recipeId);
                        added = true;
                    } else {
                        favorites.splice(index, 1);
                        added = false;
                    }
                }
                
                LocalCache.saveFavorites(userId, favorites);
                return added;
            },
            
            async getFavorites(userId) {
                if (this.useCloud) {
                    return await CloudDB.getFavorites(userId);
                } else {
                    return LocalCache.getFavorites(userId);
                }
            },
            
            // Поиск
            searchByIngredients(ingredientsArray) {
                return LocalCache.searchByIngredients(ingredientsArray);
            }
        };

                await addRecipe();

                modal.addEventListener('click', function(e) {
                    if (e.target === this) {
                        this.classList.remove('active');
                    }
                });
            });
        }
        
        // ========== ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ==========
        async function updateUserInterface() {
            const userActions = document.getElementById('user-actions');
            const addRecipeBtn = document.getElementById('add-recipe-btn');
            
            if (currentUser) {
                const favorites = await DB.getFavorites(currentUser.id);
                
                userActions.innerHTML = `
                    <div class="user-info">
                        <div class="user-avatar">${currentUser.avatar || currentUser.name.charAt(0)}</div>
                        <span>${currentUser.name}</span>
                    </div>
                    <button class="action-btn" onclick="navigateTo('favorites')">
                        ⭐
                        <span class="favorites-count">
                            ${favorites.length}
                        </span>
                    </button>
                    <button class="action-btn" onclick="logout()">🚪</button>
                `;
                
                addRecipeBtn.style.display = 'block';
            } else {
                userActions.innerHTML = `
                    <button class="nav-item" onclick="showAuthModal('login')">Вход</button>
                    <button class="nav-item" onclick="showAuthModal('register')">Регистрация</button>
                `;
                
                addRecipeBtn.style.display = 'none';
            }
            
            // Обновляем активную вкладку
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.textContent.includes(getNavText(currentPage))) {
                    item.classList.add('active');
                }
            });
        }
        
        function getNavText(page) {
            const map = {

        // ========== ИСПРАВЛЕННАЯ ФУНКЦИЯ ПОИСКА ==========
        async function performUniversalSearch() {
            const input = document.getElementById('universal-search');
            let query = input.value.trim();
            
            if (!query) {
                // Если поиск пустой, скрываем результаты
                const resultsSection = document.getElementById('search-results-section');
                if (resultsSection) {
                    resultsSection.innerHTML = '';
                }
                currentSearchQuery = '';
                return;
            }
            
            currentSearchQuery = query;
            
            // Разбиваем запрос на отдельные ингредиенты (по запятой или пробелу)
            const searchTerms = query.toLowerCase()
                .split(/[,\s]+/)
                .map(term => term.trim())
                .filter(term => term.length > 0);
            
            const allRecipes = await DB.getRecipes();
            
            // Ищем рецепты по всем критериям
            const results = allRecipes.filter(recipe => {
                // Приводим все поля к нижнему регистру для поиска
                const titleLower = recipe.title.toLowerCase();
                const ingredientsText = (recipe.ingredients || []).join(' ').toLowerCase();
                const tagsText = (recipe.tags || []).join(' ').toLowerCase();
                const categoryLower = (recipe.category || '').toLowerCase();
                const descriptionLower = (recipe.description || '').toLowerCase();
                
                // Проверяем каждый поисковый термин
                return searchTerms.some(term => {
                    return titleLower.includes(term) ||
                           ingredientsText.includes(term) ||
                           tagsText.includes(term) ||
                           categoryLower.includes(term) ||
                           descriptionLower.includes(term);
                });
            });
            
            await displaySearchResults(results, query);
        }
        
        // Новая функция для отображения результатов поиска
        async function displaySearchResults(results, query) {
            const resultsSection = document.getElementById('search-results-section');
            if (!resultsSection) return;
            
            const resultsHtml = await Promise.all(results.map(async recipe => renderRecipeCard(recipe)));
            
            resultsSection.innerHTML = `

                    <h3 style="font-family: 'Playfair Display', serif; color: var(--primary-green); margin-bottom: 10px; font-size: 22px;">

                    </h3>
                    <p style="color: var(--secondary-green); margin-bottom: 15px;">
                        Найдено рецептов: <strong>${results.length}</strong>
                    </p>
                    
                    ${results.length > 0 ? `

                            ${resultsHtml.join('')}
                        </div>
                    ` : `

                            </h4>
                            <p style="color: var(--gray); margin-bottom: 15px;">
                                Попробуйте изменить поисковый запрос
                            </p>
                            <button onclick="clearSearch()" style="padding: 10px 20px; background: var(--accent-green); color: white; border: none; border-radius: 8px; cursor: pointer;">
                                Очистить поиск
                            </button>
                        </div>
                    `}
                </div>
            `;
        }
        
        // ========== ФУНКЦИЯ ДЛЯ ДОБАВЛЕНИЯ ИНГРЕДИЕНТА В ПОИСК ==========
        function addIngredient(ingredient) {
            const input = document.getElementById('universal-search');
            let currentValue = input.value.trim();
            
            if (currentValue) {
                // Проверяем, не добавлен ли уже этот ингредиент
                const ingredients = currentValue.split(/[,\s]+/).map(i => i.trim().toLowerCase());
                const ingredientLower = ingredient.toLowerCase();
                
                if (!ingredients.includes(ingredientLower)) {
                    input.value = currentValue + ', ' + ingredient;
                }
            } else {
                input.value = ingredient;
            }
            
            // Автоматически запускаем поиск
            performUniversalSearch();
        }
        
        // ========== ФУНКЦИЯ ОЧИСТКИ ПОИСКА ==========
        function clearSearch() {
            currentSearchQuery = '';
            const input = document.getElementById('universal-search');
            if (input) {

            // Скрываем результаты поиска
            const resultsSection = document.getElementById('search-results-section');
            if (resultsSection) {
                resultsSection.innerHTML = '';
            }
        }
